<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wii U modding guide</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      background: #0f172a;
      color: white;
    }
    .card {
      text-align: center;
      background: #111827;
      padding: 32px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      width: min(90vw, 420px);
    }
    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      padding: 14px 22px;
      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
      color: white;
    }
    .sd { background: #2563eb; }
    .usb { background: #16a34a; }
  </style>
</head>
<body>
  <div class="card">
    <h1>What type of storage do you want to use to mod your wii u?</h1>
    <p>Click one button to continue.</p>

    <div class="buttons">
      <button class="sd" onclick="window.location.href='https://lostcannon97363.github.io/WiiU-mod-guide/sd1.html'">wiiuexploit.xyz (SD only)</button>
      <button class="usb" onclick="window.location.href='https://lostcannon97363.github.io/WiiU-mod-guide/usb1.html'">wafel.xyz(SD or USB)</button>
    </div>
  </div>
</body>
</html>
